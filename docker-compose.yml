# version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cats_db}
      POSTGRES_USER: ${POSTGRES_USER:-cats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cats_password}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cats_user} -d ${POSTGRES_DB:-cats_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cats_user}:${POSTGRES_PASSWORD:-cats_password}@postgres:5432/${POSTGRES_DB:-cats_db}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-minimum-32-characters-long}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,https://bullmqr.bullmatrix.ai,http://bullmqr.bullmatrix.ai}
      TIMEZONE: ${TIMEZONE:-Asia/Kolkata}
      SA_PASSWORD: ${SA_PASSWORD:-admin123}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_FRONTEND_80=http://bullmqr.bullmatrix.ai
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
